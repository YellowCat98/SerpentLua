name: Build Geode Mod

on:
  workflow_dispatch:
  push:
    branches:
      - "**"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        config:
        - name: Windows
          os: windows-latest

        #- name: macOS
        #  os: macos-latest

        #- name: iOS
        #  os: macos-latest
        #  target: iOS

        #- name: Android32
        #  os: ubuntu-latest
        #  target: Android32

        #- name: Android64
        #  os: ubuntu-latest
        #  target: Android64

    name: ${{ matrix.config.name }}
    runs-on: ${{ matrix.config.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Build the mod
        uses: geode-sdk/build-geode-mod@main
        with:
          combine: true
          target: ${{ matrix.config.target }}

      - name: Run ls
        shell: bash
        run: |
          ls -R .lua_output || echo "nothing inside"

      - name: Upload lua binaries
        uses: actions/upload-artifact@v4
        with:
          name: Lua Binaries
          path: .lua_output/
          if-no-files-found: warn

      - name: Upload lua binaries 2
        uses: actions/upload-artifact@v4
        with:
          name: Lua Binaries
          path: .lua_output/**/*
          if-no-files-found: warn

      - name: Upload lua binaries 3
        uses: actions/upload-artifact@v4
        with:
          name: Lua Binaries
          path: .lua_output/*
          if-no-files-found: warn

      - name: Upload lua binaries 4
        uses: actions/upload-artifact@v4
        with:
          name: Lua Binaries
          path: .lua_output/**
          if-no-files-found: warn

      - name: Upload lua binaries 5
        uses: actions/upload-artifact@v4
        with:
          name: Lua Binaries
          path: .lua_output/
          if-no-files-found: warn

      - name: Upload lua binaries 6
        uses: actions/upload-artifact@v4
        with:
          name: Lua Binaries
          path: |
            .lua_output/lua.lib
            .lua_output/lua.dll
          if-no-files-found: warn

  package:
    name: Package builds
    runs-on: ubuntu-latest
    needs: ['build']

    steps:
      - uses: geode-sdk/build-geode-mod/combine@main
        id: build

      - uses: actions/upload-artifact@v4
        with:
          name: Build Output
          path: ${{ steps.build.outputs.build-output }}